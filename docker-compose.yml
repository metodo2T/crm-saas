services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-crm_saas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm_saas}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO}
      STRIPE_PRICE_AGENCY: ${STRIPE_PRICE_AGENCY}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - easypanel
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      # HTTP router (redirect to HTTPS)
      - "traefik.http.routers.crm-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.crm-api.entrypoints=http"
      - "traefik.http.routers.crm-api.middlewares=crm-https-redirect"
      # HTTPS router
      - "traefik.http.routers.crm-api-secure.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.crm-api-secure.entrypoints=https"
      - "traefik.http.routers.crm-api-secure.tls=true"
      - "traefik.http.routers.crm-api-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.crm-api-secure.middlewares=crm-api-strip"
      # Strip /api prefix before forwarding
      - "traefik.http.middlewares.crm-api-strip.stripprefix.prefixes=/api"
      # HTTPS redirect middleware
      - "traefik.http.middlewares.crm-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.crm-https-redirect.redirectscheme.permanent=true"
      - "traefik.http.services.crm-api.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER}
        NEXT_PUBLIC_STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO}
        NEXT_PUBLIC_STRIPE_PRICE_AGENCY: ${STRIPE_PRICE_AGENCY}
    restart: unless-stopped
    environment:
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - easypanel
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      # HTTP router (redirect to HTTPS)
      - "traefik.http.routers.crm-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.crm-web.entrypoints=http"
      - "traefik.http.routers.crm-web.middlewares=crm-https-redirect"
      # HTTPS router
      - "traefik.http.routers.crm-web-secure.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.crm-web-secure.entrypoints=https"
      - "traefik.http.routers.crm-web-secure.tls=true"
      - "traefik.http.routers.crm-web-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm-web.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  easypanel:
    external: true
